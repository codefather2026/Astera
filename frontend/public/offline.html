<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astera — Offline</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Inter, system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0b1220;
        color: #f8fafc;
      }
      .container {
        max-width: 540px;
        padding: 32px;
        text-align: center;
      }
      h1 {
        margin-bottom: 16px;
        font-size: 2rem;
      }
      p {
        margin: 0;
        line-height: 1.75;
      }
      .hint {
        margin-top: 24px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You’re offline</h1>
      <p>
        Astera is currently unable to reach the network. You can still view cached
        content and resume when connectivity returns.
      </p>
      <p class="hint">Please check your connection or try again in a moment.</p>
    </div>
  </body>
</html>
